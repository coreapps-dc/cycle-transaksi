<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cycle Transaksi</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div id="app"></div>
  <script>
    async function loadComponent(path) {
      const response = await fetch(path);
      if (!response.ok) {
        throw new Error(`Gagal memuat ${path}`);
      }
      return await response.text();
    }
    async function loadScript(src) {
      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = src;
        script.onload = resolve;
        script.onerror = () => reject(new Error(`Gagal memuat ${src}`));
        document.body.appendChild(script);
      });
    }
    async function init() {
      try {
        // Load HTML terlebih dahulu
        const body1 = await loadComponent("components/body1.html");
        const body2 = await loadComponent("components/body2.html");
        document.getElementById("app").innerHTML = body1 + body2;
        // Load JavaScript sesuai urutan
        await loadScript("services/api.js");
        await loadScript("js/core.js");
        await loadScript("js/cycle-validasi.js");
        await loadScript("js/admin.js");
        await loadScript("js/dashboard.js");
        await loadScript("js/task-investigasi.js");
        await loadScript("js/misc.js");
      } catch (err) {
        console.error(err);
      }
    }
    init();
  </script>
</body>
</html>
